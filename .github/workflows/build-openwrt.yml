name: Build OpenWrt for Letv LBA-047-CH

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-22.03
  CONFIG_FILE: .config
  UPLOAD_BIN_DIR: true
  UPLOAD_FIRMWARE: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Initialize Environment
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget
        sudo apt-get clean

    - name: Clone OpenWrt Source
      run: |
        git clone --depth 1 -b $REPO_BRANCH $REPO_URL openwrt
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Find and Modify DTS
      run: |
        cd openwrt/target/linux/ath79/dts
        
        # 查找 Letv LBA-047-CH 的原始 DTS 文件
        DTS_FILE=$(ls -la | grep -i "letv.*lba" | awk '{print $NF}')
        echo "Found DTS file: $DTS_FILE"
        
        if [ -z "$DTS_FILE" ]; then
          echo "ERROR: Letv LBA-047-CH DTS file not found!"
          echo "Available DTS files:"
          ls -la | grep -i "letv\|lba"
          exit 1
        fi
        
        # 备份原始文件
        cp "$DTS_FILE" "${DTS_FILE}.bak"
        
        # 检查是否已有 USB/PCIe 配置
        if grep -q "&usb0" "$DTS_FILE"; then
          echo "USB0 already defined, skipping..."
        else
          echo "" >> "$DTS_FILE"
          echo "/* Added USB and PCIe support */" >> "$DTS_FILE"
          echo "&usb0 {" >> "$DTS_FILE"
          echo "    status = \"okay\";" >> "$DTS_FILE"
          echo "};" >> "$DTS_FILE"
          echo "" >> "$DTS_FILE"
          echo "&usb1 {" >> "$DTS_FILE"
          echo "    status = \"okay\";" >> "$DTS_FILE"
          echo "};" >> "$DTS_FILE"
          echo "USB support added!"
        fi
        
        if grep -q "&pcie0" "$DTS_FILE"; then
          echo "PCIe already defined, skipping..."
        else
          echo "" >> "$DTS_FILE"
          echo "&pcie0 {" >> "$DTS_FILE"
          echo "    status = \"okay\";" >> "$DTS_FILE"
          echo "};" >> "$DTS_FILE"
          echo "PCIe support added!"
        fi
        
        # 显示修改后的文件内容
        echo "=== Modified DTS file ==="
        cat "$DTS_FILE"

    - name: Load Custom Config
      run: |
        cd openwrt
        cat > .config << 'EOF'
        CONFIG_TARGET_ath79=y
        CONFIG_TARGET_ath79_generic=y
        CONFIG_TARGET_ath79_generic_DEVICE_letv_lba-047-ch=y
        CONFIG_PACKAGE_kmod-ath9k-htc=y
        CONFIG_PACKAGE_ath9k-htc-firmware=y
        CONFIG_PACKAGE_kmod-usb-net-qmi-wwan=y
        CONFIG_PACKAGE_kmod-usb-wdm=y
        CONFIG_PACKAGE_kmod-usb-serial-option=y
        CONFIG_PACKAGE_uqmi=y
        CONFIG_PACKAGE_luci-proto-qmi=y
        CONFIG_PACKAGE_kmod-usb2=y
        CONFIG_PACKAGE_kmod-usb-ohci=y
        CONFIG_PACKAGE_kmod-usb-ehci=y
        CONFIG
